<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🐝 0ffbee's Blog</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <header>
      <h1>代码日志</h1>
      <p class="subtitle">👋</p>
    </header>

    <main id="content" class="post-item">我的博客</main>

    <script>
      // 用 JS 去读取你本地写好的文章（比如叫 my-post.md）
      fetch("my-post.md")
        .then((response) => response.text())
        .then((text) => {
          // 用 Marked.js 把纯 Markdown 文本翻译成 HTML，并塞进网页里
          document.getElementById("content").innerHTML = marked.parse(text);
        })
        .catch((err) => {
          document.getElementById("content").innerHTML = "文章加载失败啦 😭";
        });
    </script>

    <footer>
      <p>纯手工打造的博客</p>
    </footer>
  </body>
</html>
